<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}
body {
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background-color: black;
    font-family: monospace;
}
#screen {
    display: none;
    background-color: black;
}
#rom-picker {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: #fff;
}
#rom-picker h1 {
    font-size: 20px;
    margin: 0;
}
#rom-picker label {
    padding: 10px 24px;
    border: 2px solid #444;
    border-radius: 6px;
    cursor: pointer;
    color: #0f0;
    transition: border-color 0.2s;
}
#rom-picker label:hover {
    border-color: #0f0;
}
#rom-file {
    display: none;
}
</style>
<title>wasm-genplus</title>
</head>
<body>
<div id="rom-picker">
    <h1>Genesis / Mega Drive</h1>
    <label for="rom-file">Select ROM file&hellip;</label>
    <input type="file" id="rom-file" accept=".bin,.md,.smd,.gen,.sms">
</div>
<canvas id="screen"></canvas>
</body>
</html>
